<main class="mx-auto max-w-[var(--container)] px-3 pb-8 pt-3 sm:px-4 sm:pb-10">
	<div class="mb-4 flex items-center justify-between px-1">
		<button
			(click)="goBack()"
			class="inline-flex cursor-pointer items-center gap-2 text-sm font-semibold text-[var(--c-text-secondary)] transition-colors hover:text-[var(--c-secondary)]"
			type="button"
		>
			<span class="material-symbols-outlined text-[20px]">arrow_back</span>
			{{ 'Back' | translate }}
		</button>
	</div>

	<section
		class="overflow-hidden rounded-[1.2rem] border border-[var(--c-border)] bg-[var(--c-bg-secondary)] shadow-[var(--shadow-sm)]"
	>
		<div class="border-b border-[var(--c-border)] px-4 py-5 sm:px-5">
			<p class="text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]" translate>
				Sales
			</p>
		</div>

		<div class="grid gap-3 p-3 sm:p-4 lg:grid-cols-3">
			@for (sale of cards(); track sale.id) {
				<article class="rounded-[1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-4">
					<p class="text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]">
						{{ sale.label }}
					</p>
					<h2 class="mt-2 text-lg font-semibold text-[var(--c-text-secondary)]">
						{{ sale.title }}
					</h2>
					<p class="mt-2 text-sm leading-6 text-[var(--c-text-muted)]">
						{{ sale.description }}
					</p>
				</article>
			}
		</div>
	</section>
</main>
