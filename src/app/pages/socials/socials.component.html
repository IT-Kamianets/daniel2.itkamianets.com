<main class="mx-auto max-w-[var(--container)] px-3 pb-8 pt-3 sm:px-4 sm:pb-10">
	<section
		class="socials-shell overflow-hidden rounded-[1.4rem] border border-[var(--c-border)] bg-[var(--c-bg-secondary)] shadow-[var(--shadow-sm)]"
	>
		<div class="border-b border-[var(--c-border)] px-4 py-5 sm:px-6 sm:py-6">
			<p
				class="text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
				translate
			>
				Social networks
			</p>
			<h1
				class="mt-2 text-[1.8rem] font-semibold leading-9 text-[var(--c-text-secondary)]"
				translate
			>
				Contacts and socials
			</h1>
		</div>

		<div class="grid gap-4 p-4 lg:grid-cols-[minmax(0,1fr)_18rem_minmax(0,1fr)] lg:p-6">
			<div class="space-y-4">
				<a
					class="contact-card block rounded-[1.1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-4 shadow-[var(--shadow-sm)] transition-transform duration-200 hover:-translate-y-0.5"
					href="tel:+380507232362"
					[attr.aria-label]="'Call Daniel' | translate"
				>
					<div class="flex items-start gap-4">
						<span
							class="icon-wrap mt-1 inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-full text-xl font-semibold"
							aria-hidden="true"
						>
							☎
						</span>

						<div class="min-w-0">
							<p
								class="text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
								translate
							>
								Phone
							</p>
							<p class="mt-2 text-lg font-semibold text-[var(--c-text-secondary)]">
								{{ phones[0] }}
							</p>
							<p class="text-base font-semibold text-[var(--c-text-secondary)]">
								{{ phones[1] }}
							</p>
						</div>
					</div>
				</a>

				<a
					class="contact-card block rounded-[1.1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-4 shadow-[var(--shadow-sm)] transition-transform duration-200 hover:-translate-y-0.5"
					href="mailto:daniel.big.family@gmail.com"
					[attr.aria-label]="'Write Daniel an email' | translate"
				>
					<div class="flex items-start gap-4">
						<span
							class="icon-wrap mt-1 inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-full text-xl font-semibold"
							aria-hidden="true"
						>
							@
						</span>

						<div class="min-w-0">
							<p
								class="text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
								translate
							>
								Email
							</p>
							<p
								class="mt-2 break-all text-lg font-semibold text-[var(--c-text-secondary)]"
							>
								{{ email }}
							</p>
						</div>
					</div>
				</a>

				<a
					class="contact-card block rounded-[1.1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-4 shadow-[var(--shadow-sm)] transition-transform duration-200 hover:-translate-y-0.5"
					href="https://maps.google.com/?q=площа%20Польський%20ринок%2C%204Г%2C%20Кам'янець-Подільський"
					target="_blank"
					rel="noreferrer nofollow"
					[attr.aria-label]="'Open Daniel address on map' | translate"
				>
					<div class="flex items-start gap-4">
						<span
							class="icon-wrap mt-1 inline-flex h-12 w-12 shrink-0 items-center justify-center rounded-full text-xl font-semibold"
							aria-hidden="true"
						>
							⌖
						</span>

						<div class="min-w-0">
							<p
								class="text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
								translate
							>
								Address
							</p>
							<p
								class="mt-2 text-lg font-semibold leading-7 text-[var(--c-text-secondary)]"
							>
								{{ 'Daniel Address Value' | translate }}
							</p>
						</div>
					</div>
				</a>
			</div>

			<div
				class="logo-panel relative flex min-h-[18rem] items-center justify-center rounded-[1.25rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-6 shadow-[var(--shadow-sm)]"
			>
				<div class="absolute inset-0 opacity-70" aria-hidden="true"></div>
				<div class="relative text-center">
					<img
						class="mx-auto h-auto w-[11rem] drop-shadow-[0_14px_30px_rgba(0,0,0,0.16)]"
						ngSrc="images/logo/logo.png"
						alt="Daniel"
						width="720"
						height="720"
						priority
					/>
					<p
						class="mt-4 text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
					>
						Daniel
					</p>
				</div>
			</div>

			<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-1">
				<a
					class="contact-card block rounded-[1.1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-4 shadow-[var(--shadow-sm)] transition-transform duration-200 hover:-translate-y-0.5"
					href="https://www.instagram.com/daniel.pizzeria.kp/"
					target="_blank"
					rel="noreferrer nofollow"
					[attr.aria-label]="'Open Daniel Instagram' | translate"
				>
					<p class="text-sm font-semibold text-[var(--c-text-secondary)]">Instagram</p>
					<p class="mt-2 break-all text-sm leading-6 text-[var(--c-text-muted)]">
						{{ instagram }}
					</p>
				</a>

				<a
					class="contact-card block rounded-[1.1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-4 shadow-[var(--shadow-sm)] transition-transform duration-200 hover:-translate-y-0.5"
					href="https://www.facebook.com/p/Даніель-Камянець-Подільський-100068689121934"
					target="_blank"
					rel="noreferrer nofollow"
					[attr.aria-label]="'Open Daniel Facebook' | translate"
				>
					<p class="text-sm font-semibold text-[var(--c-text-secondary)]">Facebook</p>
					<p class="mt-2 break-all text-sm leading-6 text-[var(--c-text-muted)]">
						{{ facebook }}
					</p>
				</a>

				<a
					class="contact-card block rounded-[1.1rem] border border-[var(--c-border)] bg-[var(--c-bg-primary)] p-4 shadow-[var(--shadow-sm)] transition-transform duration-200 hover:-translate-y-0.5"
					href="https://www.tiktok.com/@daniel.kamianets"
					target="_blank"
					rel="noreferrer nofollow"
					[attr.aria-label]="'Open Daniel TikTok' | translate"
				>
					<p class="text-sm font-semibold text-[var(--c-text-secondary)]">TikTok</p>
					<p class="mt-2 break-all text-sm leading-6 text-[var(--c-text-muted)]">
						{{ tiktok }}
					</p>
				</a>
			</div>
		</div>
	</section>
</main>
